<!DOCTYPE html>
<html>
<head><title>Netlify Forms</title></head>
<body>
  <!-- Service Request Form (detected by Netlify build bot) -->
  <form name="service-request" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="service-request" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="street" />
    <input name="city" />
    <input name="state" />
    <input name="zip" />
    <select name="service"></select>
    <input name="contact_method" />
    <textarea name="message"></textarea>
    <select name="source"></select>
    <input name="referral_code" />
  </form>

  <!-- Contact Form (detected by Netlify build bot) -->
  <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="subject" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
